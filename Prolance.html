<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT2409 Reviewer - Lexical & Syntax Analysis / Scopes & Bindings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header Section -->
    <div class="max-w-2xl w-full mb-8 text-center">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Prolance Reviewer Quiz</h1>
        <p class="text-slate-500">Lexical Analysis, Syntax Analysis, Names, Bindings, and Scopes</p>
    </div>

    <!-- Quiz Container -->
    <div id="quiz-card" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <!-- Progress Bar -->
        <div class="w-full bg-slate-100 h-2">
            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <!-- Question Meta -->
            <div class="flex justify-between items-center mb-6">
                <span id="topic-tag" class="px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full uppercase tracking-wider">Topic</span>
                <span id="question-number" class="text-slate-400 text-sm font-medium">Question 1/32</span>
            </div>

            <!-- Question Text -->
            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-tight">Loading question...</h2>

            <!-- Options -->
            <div id="options-container" class="grid grid-cols-1 gap-3 mb-8">
                <!-- Options will be injected here -->
            </div>

            <!-- Action Area -->
            <div id="action-area" class="hidden flex justify-end">
                <button id="next-btn" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                    Next Question 
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="Details 10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Results Container -->
    <div id="results-card" class="hidden max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 p-10 text-center">
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-2">Quiz Finished!</h2>
        <p class="text-slate-500 mb-8">Great job reviewing for your exam.</p>
        
        <div class="text-6xl font-black text-indigo-600 mb-2" id="final-score">0 / 32</div>
        <div class="text-sm text-slate-400 mb-10" id="percentage">0%</div>

        <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
            Restart Quiz
        </button>
    </div>

    <script>
        const questions = [
            { question: "What is the primary goal of Lexical Analysis?", options: ["Check program logic", "Break source code into tokens", "Execute machine code", "Create a GUI"], answer: 1, topic: "Lexical Analysis" },
            { question: "These are logical groupings of characters collected by the lexical analyzer.", options: ["Tokens", "Grammars", "Lexemes", "Contexts"], answer: 2, topic: "Lexical Analysis" },
            { question: "Which automaton is used by a lexical analyzer to recognize tokens?", options: ["NFA", "PDA", "Turing Machine", "DFA"], answer: 3, topic: "Lexical Analysis" },
            { question: "Tokens can be described using ______ in programming languages.", options: ["Regular expressions", "Context-free grammars", "Flowcharts", "Truth tables"], answer: 0, topic: "Lexical Analysis" },
            { question: "Which process involves cleaning up input text and removing comments?", options: ["Output Generation", "Input Preprocessing", "Token Classification", "Tokenization"], answer: 1, topic: "Lexical Analysis" },
            { question: "In the code 'result = oldsum', which lexeme represents the identifier?", options: ["=", ";", "result", "oldsum"], answer: 2, topic: "Lexical Analysis" },
            { question: "What are considered 'Non-tokens'?", options: ["Keywords", "Operators", "Comments and blanks", "Variables"], answer: 2, topic: "Lexical Analysis" },
            { question: "Which phase comes after Lexical Analysis?", options: ["Code Optimization", "Syntax Analysis", "Semantic Analysis", "Target Code Gen"], answer: 1, topic: "Syntax Analysis" },
            { question: "Syntax analysis is also known as ______.", options: ["Scanning", "Parsing", "Linking", "Loading"], answer: 1, topic: "Syntax Analysis" },
            { question: "What is the hierarchical representation of a program's structure produced by the parser?", options: ["Lexeme List", "Token Stream", "Abstract Syntax Tree (AST)", "Symbol Table"], answer: 2, topic: "Syntax Analysis" },
            { question: "Syntax analysis uses ______ to define the rules of the language.", options: ["DFA", "Regular Expressions", "Context-Free Grammar (CFG)", "Finite Automata"], answer: 2, topic: "Syntax Analysis" },
            { question: "The process of applying CFG rules to generate a valid sequence of tokens is called ______.", options: ["Derivation", "Integration", "Reduction", "Abstraction"], answer: 0, topic: "Syntax Analysis" },
            { question: "A grammar is ______ if it has more than one parse tree for at least one string.", options: ["Recursive", "Ambiguous", "Dynamic", "Complex"], answer: 1, topic: "Syntax Analysis" },
            { question: "In a parse tree, interior nodes represent ______.", options: ["Terminals", "Operators", "Non-terminals", "Leaf nodes"], answer: 2, topic: "Syntax Analysis" },
            { question: "Which property decides which side an operator takes an operand if operators are on both sides?", options: ["Precedence", "Ambiguity", "Associativity", "Shadowing"], answer: 2, topic: "Syntax Analysis" },
            { question: "What is the highest priority operator in Python?", options: ["Multiplication", "Binary +", "Exponentiation (**)", "Unary +"], answer: 2, topic: "Syntax Analysis" },
            { question: "The term 'identifier' can be used interchangeably with ______.", options: ["Variable", "Name", "Symbol", "Token"], answer: 1, topic: "Names" },
            { question: "Which naming convention is used in 'myFirstCode'?", options: ["Snake case", "Pascal case", "Camel case", "Kebab case"], answer: 2, topic: "Names" },
            { question: "In PHP, variable names must begin with which sign?", options: ["@", "%", "&", "$"], answer: 3, topic: "Names" },
            { question: "In 'snake_case', words are separated by ______.", options: ["Hyphens", "Capital letters", "Underscores", "Spaces"], answer: 2, topic: "Names" },
            { question: "A special word that cannot be used as a name is called a ______.", options: ["Keyword", "Reserved word", "Literal", "Abstract word"], answer: 1, topic: "Names" },
            { question: "Variables are characterized as a ______ of attributes (Name, Address, Type, Value, Lifetime, Scope).", options: ["Quadruple", "Quintuple", "Sextuple", "Septuple"], answer: 2, topic: "Variables" },
            { question: "A variable's value is also called its ______.", options: ["l-value", "r-value", "Pointer", "Binding"], answer: 1, topic: "Variables" },
            { question: "The address of a variable is also referred to as its ______.", options: ["l-value", "r-value", "Reference", "Scope"], answer: 0, topic: "Variables" },
            { question: "The time an association between an attribute and entity takes place is called ______.", options: ["Run time", "Binding time", "Load time", "Compile time"], answer: 1, topic: "Bindings" },
            { question: "In Java, a variable is bound to a type at ______.", options: ["Language design time", "Compile time", "Run time", "Language implementation time"], answer: 1, topic: "Bindings" },
            { question: "A declaration that lists variable names and specifies their type directly is ______.", options: ["Implicit", "Static", "Explicit", "Dynamic"], answer: 2, topic: "Bindings" },
            { question: "Python variables are ______ typed.", options: ["Statically", "Implicitly", "Explicitly", "Dynamically"], answer: 3, topic: "Bindings" },
            { question: "What is the range of statements where a variable is visible?", options: ["Lifetime", "Scope", "Binding", "Address"], answer: 1, topic: "Scopes" },
            { question: "What does the 'E' in Python's LEGB rule stand for?", options: ["External", "Environment", "Enclosing", "Explicit"], answer: 2, topic: "Scopes" },
            { question: "When a local variable has the same name as a global variable, the local variable ______ the global one.", options: ["Deletes", "Shadows", "Renames", "Links"], answer: 1, topic: "Scopes" },
            { question: "Which keyword in Python is used to modify a variable declared outside a function?", options: ["static", "public", "global", "extern"], answer: 2, topic: "Scopes" }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const quizCard = document.getElementById('quiz-card');
        const resultsCard = document.getElementById('results-card');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionNumber = document.getElementById('question-number');
        const topicTag = document.getElementById('topic-tag');
        const progressBar = document.getElementById('progress-bar');
        const actionArea = document.getElementById('action-area');
        const nextBtn = document.getElementById('next-btn');

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            questionText.textContent = q.question;
            topicTag.textContent = q.topic;
            questionNumber.textContent = `Question ${currentQuestionIndex + 1}/${questions.length}`;
            progressBar.style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            actionArea.classList.add('hidden');

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-4 rounded-xl border-2 border-slate-200 text-left font-medium transition-all hover:bg-slate-50 hover:border-indigo-300 group flex justify-between items-center";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(index) {
            const q = questions[currentQuestionIndex];
            const buttons = optionsContainer.getElementsByTagName('button');
            
            // Disable all buttons
            for (let btn of buttons) {
                btn.disabled = true;
            }

            if (index === q.answer) {
                buttons[index].classList.add('correct');
                score++;
            } else {
                buttons[index].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
            }

            actionArea.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizCard.classList.add('hidden');
            resultsCard.classList.remove('hidden');
            const finalScore = document.getElementById('final-score');
            const percentage = document.getElementById('percentage');
            
            finalScore.textContent = `${score} / ${questions.length}`;
            const perc = Math.round((score / questions.length) * 100);
            percentage.textContent = `${perc}% Completion Score`;
        }

        // Start
        window.onload = loadQuestion;
    </script>
</body>
</html>
