<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT2409 Reviewer - Lexical & Syntax Analysis / Scopes & Bindings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .explanation-box { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header Section -->
    <div class="max-w-2xl w-full mb-8 text-center">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Prolance Reviewer Quiz</h1>
        <p class="text-slate-500">Lexical Analysis, Syntax Analysis, Names, Bindings, and Scopes</p>
    </div>

    <!-- Quiz Container -->
    <div id="quiz-card" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <!-- Progress Bar -->
        <div class="w-full bg-slate-100 h-2">
            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <!-- Question Meta -->
            <div class="flex justify-between items-center mb-6">
                <span id="topic-tag" class="px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full uppercase tracking-wider">Topic</span>
                <span id="question-number" class="text-slate-400 text-sm font-medium">Question 1/32</span>
            </div>

            <!-- Question Text -->
            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-tight">Loading question...</h2>

            <!-- Options -->
            <div id="options-container" class="grid grid-cols-1 gap-3 mb-6">
                <!-- Options will be injected here -->
            </div>

            <!-- Explanation Area -->
            <div id="explanation-container" class="hidden mb-6 p-4 bg-amber-50 border-l-4 border-amber-400 rounded-r-lg explanation-box">
                <p class="text-sm font-bold text-amber-800 mb-1">Bakit ito ang sagot?</p>
                <p id="explanation-text" class="text-sm text-amber-900 leading-relaxed"></p>
            </div>

            <!-- Action Area -->
            <div id="action-area" class="hidden flex justify-end">
                <button id="next-btn" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                    Next Question
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Results Container -->
    <div id="results-card" class="hidden max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 p-10 text-center">
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-2">Tapos na ang Quiz!</h2>
        <p class="text-slate-500 mb-8">Magaling! Handa ka na para sa iyong exam.</p>
        
        <div class="text-6xl font-black text-indigo-600 mb-2" id="final-score">0 / 32</div>
        <div class="text-sm text-slate-400 mb-10" id="percentage">0%</div>

        <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
            Retake ang Quiz
        </button>
    </div>

    <script>
        const rawQuestions = [
            { question: "What is the primary goal of Lexical Analysis?", options: ["Check program logic", "Break source code into tokens", "Execute machine code", "Create a GUI"], answer: "Break source code into tokens", topic: "Lexical Analysis", explanation: "Ang Lexical Analysis ang unang phase kung saan binabasa ang characters at ginagawang 'tokens' gaya ng keywords o identifiers." },
            { question: "These are logical groupings of characters collected by the lexical analyzer.", options: ["Tokens", "Grammars", "Lexemes", "Contexts"], answer: "Lexemes", topic: "Lexical Analysis", explanation: "Ang lexemes ay ang actual strings (halimbawa, 'int' o 'x') na binabasa bago sila i-classify bilang tokens." },
            { question: "Which automaton is used by a lexical analyzer to recognize tokens?", options: ["NFA", "PDA", "Turing Machine", "DFA"], answer: "DFA", topic: "Lexical Analysis", explanation: "DFA o Deterministic Finite Automata ang ginagamit dahil mabilis at efficient ito sa pagkilala ng patterns (Regular Expressions)." },
            { question: "Tokens can be described using ______ in programming languages.", options: ["Regular expressions", "Context-free grammars", "Flowcharts", "Truth tables"], answer: "Regular expressions", topic: "Lexical Analysis", explanation: "Regular expressions ang standard mathematical way para i-define ang structure ng tokens." },
            { question: "Which process involves cleaning up input text and removing comments?", options: ["Output Generation", "Input Preprocessing", "Token Classification", "Tokenization"], answer: "Input Preprocessing", topic: "Lexical Analysis", explanation: "Sa preprocessing tinatanggal ang mga bagay na hindi kailangan ng logic gaya ng comments at extra whitespaces." },
            { question: "In the code 'result = oldsum', which lexeme represents the identifier?", options: ["=", ";", "result", "oldsum"], answer: "result", topic: "Lexical Analysis", explanation: "Ang 'result' at 'oldsum' ay parehong identifiers. Pinili dito ang 'result' bilang sagot." },
            { question: "What are considered 'Non-tokens'?", options: ["Keywords", "Operators", "Comments and blanks", "Variables"], answer: "Comments and blanks", topic: "Lexical Analysis", explanation: "Ang mga comments at blanks ay 'non-tokens' dahil binabalewala sila ng compiler pagkatapos ng scanning phase." },
            { question: "Which phase comes after Lexical Analysis?", options: ["Code Optimization", "Syntax Analysis", "Semantic Analysis", "Target Code Gen"], answer: "Syntax Analysis", topic: "Syntax Analysis", explanation: "Pagkatapos makuha ang tokens (Lexical), iche-check naman ang grammar o structure ng code (Syntax)." },
            { question: "Syntax analysis is also known as ______.", options: ["Scanning", "Parsing", "Linking", "Loading"], answer: "Parsing", topic: "Syntax Analysis", explanation: "Ang parsing ay ang proseso ng pag-aanalyze ng tokens base sa rules ng grammar." },
            { question: "What is the hierarchical representation of a program's structure produced by the parser?", options: ["Lexeme List", "Token Stream", "Abstract Syntax Tree (AST)", "Symbol Table"], answer: "Abstract Syntax Tree (AST)", topic: "Syntax Analysis", explanation: "Ang AST ay nagpapakita ng structure ng code sa anyong 'tree' para mas madaling ma-analyze ng compiler." },
            { question: "Syntax analysis uses ______ to define the rules of the language.", options: ["DFA", "Regular Expressions", "Context-Free Grammar (CFG)", "Finite Automata"], answer: "Context-Free Grammar (CFG)", topic: "Syntax Analysis", explanation: "Mas powerful ang CFG kaysa sa Regular Expressions kaya ito ang ginagamit para sa syntax rules." },
            { question: "The process of applying CFG rules to generate a valid sequence of tokens is called ______.", options: ["Derivation", "Integration", "Reduction", "Abstraction"], answer: "Derivation", topic: "Syntax Analysis", explanation: "Derivation ang tawag sa pag-apply ng rules para makabuo ng tamang sentence o code sequence." },
            { question: "A grammar is ______ if it has more than one parse tree for at least one string.", options: ["Recursive", "Ambiguous", "Dynamic", "Complex"], answer: "Ambiguous", topic: "Syntax Analysis", explanation: "Ang 'Ambiguity' ay nakakalito sa compiler dahil dalawa ang pwedeng maging interpretasyon sa iisang code." },
            { question: "In a parse tree, interior nodes represent ______.", options: ["Terminals", "Operators", "Non-terminals", "Leaf nodes"], answer: "Non-terminals", topic: "Syntax Analysis", explanation: "Ang non-terminals ay ang mga rules/categories sa loob ng tree, habang ang leaves ay ang actual tokens (terminals)." },
            { question: "Which property decides which side an operator takes an operand if operators are on both sides?", options: ["Precedence", "Ambiguity", "Associativity", "Shadowing"], answer: "Associativity", topic: "Syntax Analysis", explanation: "Associativity ang nagdidikta kung left-to-right o right-to-left ang pagkalkula kapag pareho ang precedence." },
            { question: "What is the highest priority operator in Python?", options: ["Multiplication", "Binary +", "Exponentiation (**)", "Unary +"], answer: "Exponentiation (**)", topic: "Syntax Analysis", explanation: "Ang exponentiation (**) ang pinakamataas ang priority sa Python math operations." },
            { question: "The term 'identifier' can be used interchangeably with ______.", options: ["Variable", "Name", "Symbol", "Token"], answer: "Name", topic: "Names", explanation: "Sa programming language theory, ang identifier ay ang technically na string na tumutukoy sa isang 'Name'." },
            { question: "Which naming convention is used in 'myFirstCode'?", options: ["Snake case", "Pascal case", "Camel case", "Kebab case"], answer: "Camel case", topic: "Names", explanation: "Camel case ay nagsisimula sa maliit na letter at malaki ang simula ng bawat kasunod na salita." },
            { question: "In PHP, variable names must begin with which sign?", options: ["@", "%", "&", "$"], answer: "$", topic: "Names", explanation: "Kailangang may '$' sign sa simula ng bawat variable sa PHP." },
            { question: "In 'snake_case', words are separated by ______.", options: ["Hyphens", "Capital letters", "Underscores", "Spaces"], answer: "Underscores", topic: "Names", explanation: "Snake case uses underscores (halimbawa: ang_aking_variable)." },
            { question: "A special word that cannot be used as a name is called a ______.", options: ["Keyword", "Reserved word", "Literal", "Abstract word"], answer: "Reserved word", topic: "Names", explanation: "Kapag ang isang keyword ay bawal gamitin bilang identifier, ito ay tinatawag na Reserved Word." },
            { question: "Variables are characterized as a ______ of attributes (Name, Address, Type, Value, Lifetime, Scope).", options: ["Quadruple", "Quintuple", "Sextuple", "Septuple"], answer: "Sextuple", topic: "Variables", explanation: "May anim (sextuple) na katangian ang bawat variable." },
            { question: "A variable's value is also called its ______.", options: ["l-value", "r-value", "Pointer", "Binding"], answer: "r-value", topic: "Variables", explanation: "R-value (Right side) ang tawag sa value, habang L-value (Left side) ang tawag sa address." },
            { question: "The address of a variable is also referred to as its ______.", options: ["l-value", "r-value", "Reference", "Scope"], answer: "l-value", topic: "Variables", explanation: "L-value (Left value) ang tumutukoy sa memory location o address ng variable." },
            { question: "The time an association between an attribute and entity takes place is called ______.", options: ["Run time", "Binding time", "Load time", "Compile time"], answer: "Binding time", topic: "Bindings", explanation: "Binding time ang tawag sa oras kung kailan ikinakabit ang isang attribute sa isang entity." },
            { question: "In Java, a variable is bound to a type at ______.", options: ["Language design time", "Compile time", "Run time", "Language implementation time"], answer: "Compile time", topic: "Bindings", explanation: "Ang Java ay Statically Typed, kaya alam na ang type ng variable habang nagko-compile pa lang." },
            { question: "A declaration that lists variable names and specifies their type directly is ______.", options: ["Implicit", "Static", "Explicit", "Dynamic"], answer: "Explicit", topic: "Bindings", explanation: "Explicit declaration kapag direkta mong sinulat ang type, gaya ng 'int x;'." },
            { question: "Python variables are ______ typed.", options: ["Statically", "Implicitly", "Explicitly", "Dynamically"], answer: "Dynamically", topic: "Bindings", explanation: "Dynamically typed ang Python dahil ang type ay nalalaman lang habang tumatakbo ang program (Run time)." },
            { question: "What is the range of statements where a variable is visible?", options: ["Lifetime", "Scope", "Binding", "Address"], answer: "Scope", topic: "Scopes", explanation: "Scope ang tawag sa area kung saan 'visible' o pwedeng gamitin ang isang variable." },
            { question: "What does the 'E' in Python's LEGB rule stand for?", options: ["External", "Environment", "Enclosing", "Explicit"], answer: "Enclosing", topic: "Scopes", explanation: "LEGB: Local, Enclosing (non-local), Global, at Built-in." },
            { question: "When a local variable has the same name as a global variable, the local variable ______ the global one.", options: ["Deletes", "Shadows", "Renames", "Links"], answer: "Shadows", topic: "Scopes", explanation: "Shadowing (o masking) ang tawag kapag natatakpan ng inner variable ang outer variable na pareho ang pangalan." },
            { question: "Which keyword in Python is used to modify a variable declared outside a function?", options: ["static", "public", "global", "extern"], answer: "global", topic: "Scopes", explanation: "Ginagamit ang 'global' keyword para sabihin sa Python na ang gagamitin mong variable ay yung nasa labas ng function." }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        // Shuffle Function
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Initialize Quiz
        function initQuiz() {
            try {
                // Shuffle ang listahan ng questions
                questions = shuffleArray([...rawQuestions]).map(q => {
                    // Shuffle din ang options sa bawat question
                    return {
                        ...q,
                        shuffledOptions: shuffleArray([...q.options])
                    };
                });
                
                currentQuestionIndex = 0;
                score = 0;
                loadQuestion();
            } catch (err) {
                console.error("Initialization Error:", err);
                document.getElementById('question-text').textContent = "Error loading quiz. Please refresh.";
            }
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            
            // DOM Elements
            const questionText = document.getElementById('question-text');
            const topicTag = document.getElementById('topic-tag');
            const questionNumber = document.getElementById('question-number');
            const progressBar = document.getElementById('progress-bar');
            const optionsContainer = document.getElementById('options-container');
            const explanationContainer = document.getElementById('explanation-container');
            const actionArea = document.getElementById('action-area');

            // Set content
            questionText.textContent = q.question;
            topicTag.textContent = q.topic;
            questionNumber.textContent = `Tanong ${currentQuestionIndex + 1}/${questions.length}`;
            progressBar.style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;
            
            // Reset UI
            optionsContainer.innerHTML = '';
            explanationContainer.classList.add('hidden');
            actionArea.classList.add('hidden');

            // Create buttons
            q.shuffledOptions.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-4 rounded-xl border-2 border-slate-200 text-left font-medium transition-all hover:bg-slate-50 hover:border-indigo-300 flex justify-between items-center";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => selectOption(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedText, selectedBtn) {
            const q = questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            const explanationContainer = document.getElementById('explanation-container');
            const explanationText = document.getElementById('explanation-text');
            const actionArea = document.getElementById('action-area');

            // Disable all buttons and show colors
            buttons.forEach(btn => {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                
                if (btnText === q.answer) {
                    btn.classList.add('correct');
                } else if (btn === selectedBtn && selectedText !== q.answer) {
                    btn.classList.add('wrong');
                }
            });

            if (selectedText === q.answer) {
                score++;
            }

            // Show explanation
            explanationText.textContent = q.explanation;
            explanationContainer.classList.remove('hidden');
            actionArea.classList.remove('hidden');
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('quiz-card').classList.add('hidden');
            const resultsCard = document.getElementById('results-card');
            resultsCard.classList.remove('hidden');
            
            const finalScore = document.getElementById('final-score');
            const percentage = document.getElementById('percentage');
            
            finalScore.textContent = `${score} / ${questions.length}`;
            const perc = Math.round((score / questions.length) * 100);
            percentage.textContent = `${perc}% Completion Score`;
        }

        // Siguraduhin na ang DOM ay handa na bago simulan ang quiz
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initQuiz);
        } else {
            initQuiz();
        }
    </script>
</body>
</html>
