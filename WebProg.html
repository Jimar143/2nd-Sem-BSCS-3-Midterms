<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT2207 Reviewer - ASP.NET Web Forms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .option-btn:disabled { cursor: not-allowed; }
        
        /* Light Mode Feedback */
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        
        /* Dark Mode Feedback */
        .dark .correct { background-color: #064e3b !important; border-color: #10b981 !important; color: #ecfdf5 !important; }
        .dark .wrong { background-color: #7f1d1d !important; border-color: #ef4444 !important; color: #fef2f2 !important; }

        .explanation-box { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex flex-col items-center py-10 px-4 transition-colors duration-300">

    <div class="fixed top-4 right-4">
        <button id="theme-toggle" class="p-3 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:scale-110 transition-all">
            <span id="theme-toggle-icon">🌙</span>
        </button>
    </div>

    <div class="max-w-2xl w-full mb-8 text-center">
        <h1 class="text-3xl font-extrabold text-slate-800 dark:text-white mb-2">ASP.NET Web Forms Quiz</h1>
        <p class="text-slate-500 dark:text-slate-400">Comprehensive Review for Handout 03 & 04 (IT2207)</p>
    </div>

    <div id="quiz-card" class="max-w-2xl w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
        <div class="w-full bg-slate-100 dark:bg-slate-700 h-2">
            <div id="progress-bar" class="bg-indigo-600 dark:bg-indigo-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <span id="topic-tag" class="px-3 py-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 text-xs font-bold rounded-full uppercase tracking-wider">Topic</span>
                <span id="question-number" class="text-slate-400 dark:text-slate-500 text-sm font-medium">Question 1/40</span>
            </div>

            <h2 id="question-text" class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-8 leading-tight">Loading...</h2>

            <div id="options-container" class="grid grid-cols-1 gap-3 mb-6"></div>

            <div id="explanation-container" class="hidden mb-6 p-4 bg-amber-50 dark:bg-amber-900/20 border-l-4 border-amber-400 rounded-r-lg explanation-box">
                <p class="text-sm font-bold text-amber-800 dark:text-amber-400 mb-1">Wait, why?</p>
                <p id="explanation-text" class="text-sm text-amber-900 dark:text-amber-200 leading-relaxed"></p>
            </div>

            <div id="action-area" class="hidden flex justify-end">
                <button id="next-btn" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg flex items-center gap-2">
                    Next Question 
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="results-card" class="hidden max-w-2xl w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 p-10 text-center">
        <h2 class="text-3xl font-black text-slate-800 dark:text-white mb-2">Quiz Finished!</h2>
        <div class="text-6xl font-black text-indigo-600 dark:text-indigo-400 mb-2" id="final-score">0 / 40</div>
        <div class="text-sm text-slate-400 dark:text-slate-500 mb-10" id="percentage">0%</div>
        <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all">Restart Review</button>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            document.getElementById('theme-toggle-icon').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        });

        const rawQuestions = [
            { question: "What is the primary infrastructure used to provide a programming model and services for building web applications in this module?", options: ["ASP.NET Web Forms", "Node.js", "Django", "React Native"], answer: "ASP.NET Web Forms", topic: "Basics", explanation: "ASP.NET Web Forms is part of the .NET infrastructure providing services to build web apps." },
            { question: "Which feature of ASP.NET Web Forms transfers state information between the browser and server?", options: ["Cookies", "JSON tokens", "ViewState", "Local Storage"], answer: "ViewState", topic: "ViewState", explanation: "ViewState allows ASP.NET to maintain state in a stateless environment by transferring info between client and server." },
            { question: "In which Page Lifecycle stage does the system determine if run-time compilation is necessary?", options: ["Start", "Page Request", "Initialization", "Load"], answer: "Page Request", topic: "Lifecycle Stages", explanation: "Page Request is the very first stage where the system checks if compilation is needed or if cached output can be returned." },
            { question: "During which stage are Request and Response base variables initialized?", options: ["Initialization", "Rendering", "Start", "Unload"], answer: "Start", topic: "Lifecycle Stages", explanation: "In the Start stage, variables like Request, Response, and UICulture are set up." },
            { question: "When are controls on the page initialized and assigned unique IDs?", options: ["Initialization", "Load", "Postback Event Handling", "Start"], answer: "Initialization", topic: "Lifecycle Stages", explanation: "Initialization is when control properties are initialized and IDs are assigned." },
            { question: "If the request is a postback, when is control information recovered from the view state?", options: ["PreInit", "Load", "Rendering", "Unload"], answer: "Load", topic: "Lifecycle Stages", explanation: "During the Load stage, if it's a postback, control info is loaded from ViewState." },
            { question: "At which stage does control validation and event handler firing occur?", options: ["Initialization", "Start", "Postback Event Handling", "Rendering"], answer: "Postback Event Handling", topic: "Lifecycle Stages", explanation: "Validation and event triggers happen during Postback Event Handling." },
            { question: "When is ViewState saved for the page and all controls?", options: ["Immediately after Load", "Before the Rendering stage", "During Unload", "At Initialization"], answer: "Before the Rendering stage", topic: "Lifecycle Stages", explanation: "The lifecycle specifies ViewState is saved before rendering starts." },
            { question: "Which stage involves removing objects from memory and performing cleanup?", options: ["Start", "Rendering", "Unload", "Initialization"], answer: "Unload", topic: "Lifecycle Stages", explanation: "Unload happens after the content is sent to the client; it is for memory cleanup." },
            { question: "Which event is specifically used to create or recreate dynamic controls?", options: ["Init", "PreInit", "Load", "PreRender"], answer: "PreInit", topic: "Lifecycle Events", explanation: "PreInit is raised before initialization and is ideal for dynamic controls and setting themes." },
            { question: "What important action happens between the Init and InitComplete events?", options: ["Loading database", "Enabling ViewState for controls", "Calculating math", "Closing connections"], answer: "Enabling ViewState for controls", topic: "Lifecycle Events", explanation: "InitComplete is raised after ViewState is enabled for the controls." },
            { question: "Which event recursively calls the OnLoad method on every control?", options: ["PreLoad", "Load", "Init", "Unload"], answer: "Load", topic: "Lifecycle Events", explanation: "The Load event is called on the page and then recursively on every child control." },
            { question: "Which event is raised after every data-bound control has been bound?", options: ["PreRender", "SaveStateComplete", "PreRenderComplete", "LoadComplete"], answer: "PreRenderComplete", topic: "Lifecycle Events", explanation: "PreRenderComplete follows the binding of all data-bound controls." },
            { question: "Which of the following is NOT an event, but a method called on each control?", options: ["PreInit", "Render", "Init", "Unload"], answer: "Render", topic: "Lifecycle Events", explanation: "According to Handout 03, Render is a method the Page object calls on each control, not a standard raised event." },
            { question: "What is the category for controls that are wrappers for traditional HTML elements?", options: ["Web server controls", "HTML server controls", "User controls", "Validation controls"], answer: "HTML server controls", topic: "Control Library", explanation: "HTML server controls are specifically wrappers for standard HTML tags." },
            { question: "Which control type is used when functionality needs to be shared across multiple pages?", options: ["User controls", "Standard controls", "Data controls", "Login controls"], answer: "User controls", topic: "Control Library", explanation: "User controls are custom built for reuse across multiple pages." },
            { question: "Which type of control ensures that input values meet specific criteria?", options: ["Web server controls", "Validation controls", "HTML server controls", "Navigation controls"], answer: "Validation controls", topic: "Control Library", explanation: "Validation controls verify if user input is valid (e.g., checking if it is an integer)." },
            { question: "Where are Server Controls generally called in an ASP.NET application?", options: ["In the database", "In the HTML markup section", "Only in JavaScript", "In the CSS file"], answer: "In the HTML markup section", topic: "Server Controls", explanation: "Server controls are add-ins to the markup section (aspx file) to provide UI support." },
            { question: "Which standard control creates a list same as an unnumbered list in HTML?", options: ["Bulleted List", "ListBox", "CheckBoxList", "Panel"], answer: "Bulleted List", topic: "Standard Controls", explanation: "Bulleted List is the Web Forms version of an HTML <ul> list." },
            { question: "Which control provides a user interface for selecting one or more dates?", options: ["TextBox", "Calendar", "FileUpload", "HyperLink"], answer: "Calendar", topic: "Standard Controls", explanation: "The Calendar control creates a UI for date selection." },
            { question: "Which control is used to display text that cannot be edited by the user?", options: ["TextBox", "Label", "Button", "ListBox"], answer: "Label", topic: "Standard Controls", explanation: "Label is used to display read-only text on a web page." },
            { question: "Which control allows a user to pick only ONE item from a group?", options: ["CheckBox", "RadioButton", "BulletedList", "FileUpload"], answer: "RadioButton", topic: "Standard Controls", explanation: "RadioButtons enable selecting exactly one item in a group." },
            { question: "Which control is a combination of a button and a hyperlink?", options: ["LinkButton", "ImageButton", "ActionLink", "FastButton"], answer: "LinkButton", topic: "Standard Controls", explanation: "LinkButton looks like a link but behaves like a button (triggers postback)." },
            { question: "What is the purpose of the 'Hidden Field' control?", options: ["To display images", "To hide controls from hackers", "To hold items not for display to the user", "To make the page transparent"], answer: "To hold items not for display to the user", topic: "Standard Controls", explanation: "Hidden Fields store data needed for logic but not intended for the UI." },
            { question: "Which controls are used to help enter, access, and display data?", options: ["Data controls", "Login controls", "Navigation controls", "Validation controls"], answer: "Data controls", topic: "Control Types", explanation: "Data controls are specifically for data access and display." },
            { question: "Site Maps and Menus are examples of which control type?", options: ["Standard controls", "Navigation controls", "Data controls", "Login controls"], answer: "Navigation controls", topic: "Control Types", explanation: "Navigation controls handle menus and visual representations like Site Maps." },
            { question: "Which controls help ensure site security by following best practices for login?", options: ["Validation controls", "Login controls", "Standard controls", "HTML controls"], answer: "Login controls", topic: "Control Types", explanation: "Login controls provide pre-built security components for authentication." },
            { question: "What does the State Engine compare to track changes in a value?", options: ["The password", "Current value vs stored value", "The HTML tag name", "The screen resolution"], answer: "Current value vs stored value", topic: "State Management", explanation: "The engine tracks changes by comparing the current state to the initial stored state." },
            { question: "How are non-string items managed by the state engine on the client?", options: ["In plain text", "By serialization into hidden fields", "In the URL", "They are ignored"], answer: "By serialization into hidden fields", topic: "State Management", explanation: "The engine serializes and deserializes data into a hidden form field on the client." },
            { question: "When does the State Engine automatically restore ViewState data?", options: ["On the initial GET request", "During the postback to the server", "After the user logs out", "Only during errors"], answer: "During the postback to the server", topic: "State Management", explanation: "ViewState is restored automatically during a postback." },
            { question: "The ASP.NET State Engine stores values per control by which identifier?", options: ["Array index", "Key name", "HTML ID only", "Memory address"], answer: "Key name", topic: "State Management", explanation: "ViewState values are stored by key name: ViewState['controlname'] = value." },
            { question: "Which control allows selecting multiple items at once?", options: ["RadioButton", "ListBox", "Label", "LinkButton"], answer: "ListBox", topic: "Standard Controls", explanation: "A ListBox can be configured to allow multiple selections, unlike a RadioButton." },
            { question: "What is the primary benefit of the State Engine for 'editing' an item?", options: ["Speeds up typing", "Understand when a field has changed", "Changes the font color", "Deletes old data automatically"], answer: "Understand when a field has changed", topic: "State Management", explanation: "The state engine helps the system understand if a field was modified during editing." },
            { question: "Which event allows developers to respond to a clicking button or selecting a dropdown?", options: ["Page lifecycle", "Event handlers", "ViewState", "Initialization"], answer: "Event handlers", topic: "Basics", explanation: "Event handlers respond to client-side actions like clicks or selections." },
            { question: "Which stage involves determining whether cached output can be returned?", options: ["Start", "Page Request", "Load", "Rendering"], answer: "Page Request", topic: "Lifecycle Stages", explanation: "Page Request checks if a cached version is already available." },
            { question: "Validation of inputs happens at which time in the lifecycle?", options: ["Initialization", "Load", "Postback Event Handling", "Rendering"], answer: "Postback Event Handling", topic: "Lifecycle Stages", explanation: "Validation is part of the postback event handling phase." },
            { question: "Themes and Master pages are applied during which phase?", options: ["Start", "Initialization", "Rendering", "Unload"], answer: "Initialization", topic: "Lifecycle Stages", explanation: "According to Handout 03, Master pages and themes are applied during Initialization." },
            { question: "The OnLoad method is called first on the Page, and then where?", options: ["In the database", "On every control", "On the client browser", "Only on text boxes"], answer: "On every control", topic: "Lifecycle Events", explanation: "The Load event is recursive, moving from the page to all child controls." },
            { question: "Which control type is more abstract than an HTML server control?", options: ["Web server controls", "Plain HTML", "CSS", "Database triggers"], answer: "Web server controls", topic: "Control Library", explanation: "Web server controls are more abstract and offer more functionality than HTML server controls." },
            { question: "What is the file extension for files containing ASP.NET markup?", options: [".aspx", ".html", ".js", ".cs"], answer: ".aspx", topic: "Server Controls", explanation: "Server controls are elements added to an .aspx file." }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            questions = shuffle([...rawQuestions]).map(q => ({ ...q, options: shuffle([...q.options]) }));
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('topic-tag').textContent = q.topic;
            document.getElementById('question-number').textContent = `Question ${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('action-area').classList.add('hidden');
            document.getElementById('explanation-container').classList.add('hidden');

            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 text-left font-medium transition-all hover:bg-slate-50 dark:hover:bg-slate-700 hover:border-indigo-300 dark:text-slate-200 flex justify-between items-center";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });
        }

        function selectOption(selectedText) {
            const q = questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                const txt = btn.querySelector('span').textContent;
                if (txt === q.answer) btn.classList.add('correct');
                if (txt === selectedText && selectedText !== q.answer) btn.classList.add('wrong');
            });
            if (selectedText === q.answer) score++;
            document.getElementById('explanation-text').textContent = q.explanation;
            document.getElementById('explanation-container').classList.remove('hidden');
            document.getElementById('action-area').classList.remove('hidden');
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) loadQuestion();
            else showResults();
        };

        function showResults() {
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('results-card').classList.remove('hidden');
            document.getElementById('final-score').textContent = `${score} / ${questions.length}`;
            document.getElementById('percentage').textContent = `${Math.round((score / questions.length) * 100)}% Completion Score`;
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
