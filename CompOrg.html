<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompOrg Reviewer - Instruction Set Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header -->
    <div class="max-w-2xl w-full mb-8 text-center">
        <h1 class="text-3xl font-extrabold text-indigo-900 mb-2">Instruction Set Architecture Quiz</h1>
        <p class="text-slate-500 font-medium italic">Randomized Reviewer for CompOrg</p>
    </div>

    <!-- Main Quiz Area -->
    <div id="quiz-container" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden transition-all duration-500">
        <!-- Progress Bar -->
        <div class="w-full bg-slate-100 h-2.5">
            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
        </div>

        <div class="p-8 md:p-10">
            <!-- Question Status -->
            <div class="flex justify-between items-center mb-8">
                <span id="topic-badge" class="px-4 py-1.5 bg-indigo-50 text-indigo-700 text-[10px] font-bold rounded-full uppercase tracking-[0.1em]">Topic</span>
                <span id="q-counter" class="text-slate-400 text-sm font-bold">Question 1/32</span>
            </div>

            <!-- Question -->
            <h2 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-10 leading-snug min-h-[80px]">
                Loading question...
            </h2>

            <!-- Options -->
            <div id="options-box" class="grid grid-cols-1 gap-4 mb-10">
                <!-- Buttons injected here -->
            </div>

            <!-- Feedback & Next -->
            <div id="action-bar" class="hidden flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-slate-100 pt-8">
                <p id="feedback-msg" class="font-bold text-lg"></p>
                <button id="next-button" class="w-full sm:w-auto px-8 py-3.5 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center gap-2 group">
                    <span id="next-text">Next Question</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-container" class="hidden max-w-2xl w-full bg-white rounded-3xl shadow-2xl border border-slate-200 p-12 text-center fade-in">
        <div class="mb-8 inline-flex p-5 bg-indigo-50 rounded-full text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h2 class="text-4xl font-black text-slate-900 mb-4">Exam Ready!</h2>
        <div class="text-7xl font-black text-indigo-600 mb-4" id="final-score">0/0</div>
        <p class="text-slate-500 text-lg mb-10" id="result-comment">Great work reviewing the ISA handouts.</p>
        
        <button onclick="location.reload()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-extrabold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
            Retake Quiz (Reshuffled)
        </button>
    </div>

    <script>
        const initialData = [
            // Handout 3
            { q: "What is the collection of different instructions that a processor can execute called?", a: "Instruction set", o: ["Machine code", "Instruction set", "Operand set", "ISA cycle"], t: "ISA Fundamentals" },
            { q: "Which element of a machine instruction specifies the operation to be performed?", a: "Opcode", o: ["Source operand", "Next instruction reference", "Result operand", "Opcode"], t: "ISA Fundamentals" },
            { q: "This instruction element indicates where the processor should fetch the next instruction.", a: "Next instruction reference", o: ["Program counter", "Result operand", "Next instruction reference", "Instruction address"], t: "ISA Fundamentals" },
            { q: "Instruction categorization: Arithmetic and logic instructions fall under which category?", a: "Data processing", o: ["Data processing", "Data storage", "Data movement", "Control"], t: "ISA Categories" },
            { q: "Instruction categorization: Input and output instructions fall under which category?", a: "Data movement", o: ["Data processing", "Data movement", "Control", "Data storage"], t: "ISA Categories" },
            { q: "The x86 instruction used to move data between registers or between registers and memory is:", a: "MOV", o: ["XCHG", "LOAD", "MOV", "STORE"], t: "x86 Data Transfer" },
            { q: "What does the PUSH Source instruction do to the extended stack pointer (ESP)?", a: "Decrements ESP", o: ["Increments ESP", "Decrements ESP", "Clears ESP", "No change"], t: "x86 Data Transfer" },
            { q: "What does the POP Dest instruction do to the extended stack pointer (ESP)?", a: "Increments ESP", o: ["Increments ESP", "Decrements ESP", "Flips ESP", "Sets to zero"], t: "x86 Data Transfer" },
            { q: "Which I/O approach allows the I/O module and main memory to exchange data without processor involvement?", a: "Direct Memory Access (DMA)", o: ["Programmed I/O", "Interrupt-Driven I/O", "Direct Memory Access (DMA)", "Parallel Access"], t: "I/O Operations" },
            { q: "The x86 instruction that copies data from an I/O port to a register is:", a: "IN", o: ["OUT", "INS", "IN", "OUTS"], t: "x86 I/O" },
            { q: "Which x86 instruction performs no operation but takes up space in the instruction stream?", a: "NOP", o: ["HLT", "WAIT", "NOP", "JMP"], t: "Control Operations" },
            { q: "Which ISA relies heavily on register addressing and uses conditional execution for all instructions?", a: "ARM", o: ["x86", "IBM ESA/390", "ARM", "Intel 64"], t: "ISA Types" },
            { q: "In the ARM instruction set, which instructions are the only ones that can access memory locations?", a: "Load and Store", o: ["Arithmetic", "Branch", "Load and Store", "Multiply"], t: "ARM Instruction Set" },
            { q: "The diagram of the instruction cycle includes which step for determining where to get the command?", a: "Instruction fetch", o: ["Operand fetch", "Instruction fetch", "Data operation", "Operand store"], t: "Instruction Cycle" },
            { q: "What is the term for instructions that can only be executed in a privileged state, typically by the OS?", a: "System control instructions", o: ["Data manipulation", "System control instructions", "Arithmetic instructions", "User instructions"], t: "Control Operations" },

            // Handout 4
            { q: "Which basic arithmetic operation adds 1 to the operand?", a: "Increment", o: ["Absolute", "Negate", "Increment", "Decrement"], t: "Arithmetic" },
            { q: "The x86 instruction for signed integer multiplication is:", a: "IMUL", o: ["MUL", "IMUL", "DIV", "IDIV"], t: "x86 Arithmetic" },
            { q: "The CMP instruction compares two operands by doing what?", a: "Subtracting the 2nd from the 1st", o: ["Adding them", "Subtracting the 2nd from the 1st", "Performing XOR", "Clearing the destination"], t: "x86 Arithmetic" },
            { q: "Does the CMP instruction alter the value of the operands?", a: "No", o: ["Yes", "No", "Only the source", "Only the destination"], t: "x86 Arithmetic" },
            { q: "Which status flags does the TEST instruction set?", a: "S, Z, and P", o: ["C and O", "S, Z, and P", "Only Z", "All status flags"], t: "x86 Logic" },
            { q: "Which logic instruction inverts each bit of the operand?", a: "NOT", o: ["AND", "OR", "XOR", "NOT"], t: "x86 Logic" },
            { q: "In a Logical Shift, what value is shifted into the empty end?", a: "Zero (0)", o: ["One (1)", "The sign bit", "Zero (0)", "The last bit lost"], t: "Shift Operations" },
            { q: "Which shift operation treats data as a signed integer and does not shift the sign bit?", a: "Arithmetic Shift", o: ["Logical Shift", "Arithmetic Shift", "Cycling Shift", "Rotate"], t: "Shift Operations" },
            { q: "A rotate operation is also known as a ______ shift.", a: "Cycling", o: ["Logical", "Arithmetic", "Cycling", "Linear"], t: "Shift Operations" },
            { q: "The x86 instruction 'SAL' stands for:", a: "Shift Arithmetic Left", o: ["Shift Arithmetic Left", "Shift All Left", "Select And Load", "Store And Link"], t: "x86 Shift" },
            { q: "The x86 instruction 'SAR' shifts the operand to the right while filling empty bits based on:", a: "The operand's sign (+ or -)", o: ["Zero", "One", "The operand's sign (+ or -)", "The Carry Flag"], t: "x86 Shift" },
            { q: "Which x86 rotate instruction includes the CF (Carry Flag) as a 1-bit extension?", a: "RCL/RCR", o: ["ROL/ROR", "RCL/RCR", "SAL/SAR", "SHL/SHR"], t: "x86 Rotate" },
            { q: "Instruction Cycle: Which step delivers the result of an operation to memory or a register?", a: "Operand store", o: ["Operand fetch", "Data operation", "Operand store", "Instruction fetch"], t: "Instruction Cycle" },
            { q: "The x86 'XCHG' instruction is used to:", a: "Swap contents between two locations", o: ["Move data", "Swap contents between two locations", "Clear a register", "Jump to a procedure"], t: "x86 Data Transfer" },
            { q: "Which x86 instruction stops execution and puts the processor in a halt state?", a: "HLT", o: ["WAIT", "INT", "NOP", "HLT"], t: "x86 Control" },
            { q: "What is the purpose of Logic and Shift instructions collectively?", a: "Bit manipulation", o: ["Data storage", "Bit manipulation", "Memory addressing", "Floating point math"], t: "ISA Concepts" },
            { q: "In ARM, what bit in an instruction signifies whether to update condition flags?", a: "S bit", o: ["C bit", "S bit", "Z bit", "P bit"], t: "ARM Concepts" }
        ];

        let quizData = [];
        let currentIdx = 0;
        let score = 0;
        let selectedThisTurn = false;

        const qText = document.getElementById('question-text');
        const oBox = document.getElementById('options-box');
        const qCount = document.getElementById('q-counter');
        const tBadge = document.getElementById('topic-badge');
        const pBar = document.getElementById('progress-bar');
        const actBar = document.getElementById('action-bar');
        const fMsg = document.getElementById('feedback-msg');
        const nextBtn = document.getElementById('next-button');
        const nextText = document.getElementById('next-text');

        // Fisher-Yates Shuffle Algorithm
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function initQuiz() {
            // Shuffle the entire quiz data array
            quizData = shuffle([...initialData]);
            
            // Also shuffle options within each question
            quizData.forEach(item => {
                item.o = shuffle([...item.o]);
            });

            currentIdx = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            selectedThisTurn = false;
            actBar.classList.add('hidden');
            
            const data = quizData[currentIdx];
            
            // Update UI elements
            qText.classList.remove('fade-in');
            void qText.offsetWidth; // Trigger reflow
            qText.classList.add('fade-in');
            
            qText.textContent = data.q;
            tBadge.textContent = data.t;
            qCount.textContent = `Question ${currentIdx + 1}/${quizData.length}`;
            pBar.style.width = `${((currentIdx) / quizData.length) * 100}%`;

            // Clear and build options
            oBox.innerHTML = '';
            data.o.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-5 rounded-2xl border-2 border-slate-100 text-left font-semibold transition-all hover:bg-indigo-50 hover:border-indigo-200 hover:shadow-sm fade-in";
                btn.style.animationDelay = `${idx * 0.05}s`;
                btn.textContent = option;
                btn.onclick = () => handleSelect(option, btn);
                oBox.appendChild(btn);
            });

            if (currentIdx === quizData.length - 1) {
                nextText.textContent = "See Results";
            } else {
                nextText.textContent = "Next Question";
            }
        }

        function handleSelect(choice, btn) {
            if (selectedThisTurn) return;
            selectedThisTurn = true;
            
            const correctAns = quizData[currentIdx].a;
            const buttons = oBox.querySelectorAll('button');
            
            buttons.forEach(b => {
                b.disabled = true;
                if (b.textContent === correctAns) {
                    b.classList.add('correct');
                }
            });

            if (choice === correctAns) {
                score++;
                fMsg.textContent = "✨ Correct!";
                fMsg.className = "font-bold text-green-600 text-lg";
            } else {
                btn.classList.add('wrong');
                fMsg.textContent = "❌ Incorrect";
                fMsg.className = "font-bold text-red-600 text-lg";
            }

            actBar.classList.remove('hidden');
            // Scroll to bottom of action bar on mobile
            setTimeout(() => {
                actBar.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        nextBtn.onclick = () => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                showQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                pBar.style.width = `100%`;
                showResults();
            }
        };

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            const resCont = document.getElementById('result-container');
            resCont.classList.remove('hidden');
            
            document.getElementById('final-score').textContent = `${score}/${quizData.length}`;
            const perc = (score / quizData.length) * 100;
            const comment = document.getElementById('result-comment');
            
            if (perc >= 90) comment.textContent = "Excellent! You've mastered the Instruction Set Architecture concepts.";
            else if (perc >= 75) comment.textContent = "Good job! You have a solid grasp of the core ISA materials.";
            else if (perc >= 50) comment.textContent = "Fair effort. Review the x86 and ARM specific instructions again.";
            else comment.textContent = "Keep reviewing! Focus on identifying opcodes and operand types.";
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
