<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softwen Reviewer - Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        .option-btn:disabled { cursor: not-allowed; }
        .correct { 
            background-color: #064e3b !important; 
            border-color: #10b981 !important; 
            color: #ecfdf5 !important; 
        }
        .wrong { 
            background-color: #7f1d1d !important; 
            border-color: #ef4444 !important; 
            color: #fef2f2 !important; 
        }
        .explanation-box { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-2xl w-full mb-8 text-center">
        <h1 class="text-3xl font-extrabold text-white mb-2">Softwen Reviewer Quiz</h1>
        <p class="text-slate-400">Comprehensive Reviewer: Module 03 & Module 04</p>
    </div>

    <div id="quiz-card" class="max-w-2xl w-full bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 overflow-hidden">
        <div class="w-full bg-slate-800 h-2">
            <div id="progress-bar" class="bg-indigo-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <span id="topic-tag" class="px-3 py-1 bg-indigo-900/50 text-indigo-300 text-xs font-bold rounded-full uppercase tracking-wider border border-indigo-500/30">Topic</span>
                <span id="question-number" class="text-slate-500 text-sm font-medium">Question 1/33</span>
            </div>

            <h2 id="question-text" class="text-xl font-bold text-white mb-8 leading-tight">Loading question...</h2>

            <div id="options-container" class="grid grid-cols-1 gap-3 mb-6">
                <!-- Options injected here -->
            </div>

            <div id="explanation-container" class="hidden mb-6 p-4 bg-slate-800 border-l-4 border-indigo-500 rounded-r-lg explanation-box">
                <p class="text-sm font-bold text-indigo-400 mb-1">Key Concept</p>
                <p id="explanation-text" class="text-sm text-slate-300 leading-relaxed"></p>
            </div>

            <div id="action-area" class="hidden flex justify-end">
                <button id="next-btn" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-900/20 flex items-center gap-2">
                    Next Question 
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="results-card" class="hidden max-w-2xl w-full bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-10 text-center">
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-indigo-900/30 rounded-full flex items-center justify-center border border-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
        <h2 class="text-3xl font-black text-white mb-2">Review Complete!</h2>
        <p class="text-slate-400 mb-8">Modules 03 & 04 successfully reviewed.</p>
        <div class="text-7xl font-black text-indigo-400 mb-2" id="final-score">0 / 33</div>
        <div class="text-sm text-slate-500 uppercase tracking-widest font-bold mb-10" id="percentage">0% Mastery</div>
        <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 shadow-xl shadow-indigo-900/40">
            Restart Review
        </button>
    </div>

    <script>
        const rawQuestions = [
            // Module 03: Database Design and Administration
            { question: "What is an integrated collection of stored data that is centrally managed and controlled?", options: ["DBMS", "Database", "Metadata", "Relation"], answer: "Database", topic: "Core DB Concepts", explanation: "Database (DB): An integrated collection of stored data that is centrally managed and controlled." },
            { question: "Which system software is used specifically to manage the database?", options: ["OS", "IDE", "DBMS", "API"], answer: "DBMS", topic: "Core DB Concepts", explanation: "Database Management System (DBMS): System software used to manage the database." },
            { question: "What component of database data refers to the actual data for the problem domain?", options: ["Schema", "Metadata", "Application Domain Data", "Relation"], answer: "Application Domain Data", topic: "DB Components", explanation: "Application Domain Data: Actual data for the problem domain." },
            { question: "What describes the structure, rules, associations, and access controls of the database?", options: ["Transaction Log", "Schema (Metadata)", "Application Domain Data", "Tuple"], answer: "Schema (Metadata)", topic: "DB Components", explanation: "Schema (Metadata): Describes structure, rules, associations, and access controls." },
            { question: "Which role ensures data structure, standards, ownership, and quality?", options: ["Database Administrator", "System Analyst", "Data Administrator", "Project Manager"], answer: "Data Administrator", topic: "Admin Team", explanation: "Data Administrator (DA): Ensures data structure, standards, ownership, and quality." },
            { question: "Which role handles database operation, security, performance, and recovery?", options: ["Data Administrator", "Database Administrator", "Network Admin", "UI Designer"], answer: "Database Administrator", topic: "Admin Team", explanation: "Database Administrator (DBA): Handles database operation, security, performance, and recovery." },
            { question: "In a Relational Database, what is a two-dimensional structure of rows and columns?", options: ["Table (Relation)", "Tuple", "Attribute", "Superkey"], answer: "Table (Relation)", topic: "RDBMS Structure", explanation: "Table (Relation): Two-dimensional structure of rows and columns." },
            { question: "What term refers to a single data entry in a table?", options: ["Column", "Attribute", "Row (Tuple/Record)", "Key"], answer: "Row (Tuple/Record)", topic: "RDBMS Structure", explanation: "Row (Tuple/Record): A single data entry." },
            { question: "What term refers to a specific data field in a table?", options: ["Tuple", "Record", "Column (Attribute)", "Relation"], answer: "Column (Attribute)", topic: "RDBMS Structure", explanation: "Column (Attribute): A specific data field." },
            { question: "What type of key uniquely identifies rows in a table?", options: ["Secondary Key", "Superkey", "Foreign Key", "Attribute"], answer: "Superkey", topic: "Key Types", explanation: "Superkey: Uniquely identifies rows." },
            { question: "What is defined as a minimal superkey?", options: ["Primary Key", "Foreign Key", "Candidate Key", "Secondary Key"], answer: "Candidate Key", topic: "Key Types", explanation: "Candidate Key: Minimal superkey." },
            { question: "Which key is the selected candidate key and cannot be null?", options: ["Superkey", "Primary Key", "Foreign Key", "Secondary Key"], answer: "Primary Key", topic: "Key Types", explanation: "Primary Key: Selected candidate key (cannot be null)." },
            { question: "Which key links to a primary key in another table?", options: ["Secondary Key", "Superkey", "Candidate Key", "Foreign Key"], answer: "Foreign Key", topic: "Key Types", explanation: "Foreign Key: Links to primary key in another table." },
            { question: "Which key type is specifically used for data retrieval?", options: ["Primary Key", "Foreign Key", "Secondary Key", "Superkey"], answer: "Secondary Key", topic: "Key Types", explanation: "Secondary Key: Used for data retrieval." },
            { question: "What technique records updates for tracking and recovery?", options: ["Database Locking", "Transaction Logging", "Schema Mapping", "SDLC"], answer: "Transaction Logging", topic: "Protection", explanation: "Transaction Logging: Records updates for tracking and recovery." },
            { question: "What is a set of operations that must be completed fully?", options: ["Procedure", "Function", "Transaction", "Methodology"], answer: "Transaction", topic: "Protection", explanation: "Transaction: A set of operations that must be completed fully." },
            { question: "What technique is used to prevent data conflicts in a database?", options: ["Metadata", "Database Lock", "Analysis", "Deployment"], answer: "Database Lock", topic: "Protection", explanation: "Database Lock: Prevents data conflicts." },
            { question: "Which lock type allows read-only access but prevents others from updating?", options: ["Exclusive Lock", "Shared Lock", "Private Lock", "Public Lock"], answer: "Shared Lock", topic: "Protection", explanation: "Shared Lock: Read-only access allowed." },
            { question: "Which lock type ensures no access for others during an update?", options: ["Shared Lock", "Exclusive Lock", "Partial Lock", "Recursive Lock"], answer: "Exclusive Lock", topic: "Protection", explanation: "Exclusive Lock: No access for others during update." },

            // Module 04: Approaches to System Development
            { question: "What does SDLC stand for in system development?", options: ["System Data Logic Control", "Software Design Life Cycle", "Software Development Life Cycle", "Standard Data Linkage Code"], answer: "Software Development Life Cycle", topic: "SDLC Approaches", explanation: "Software Development Life Cycle (SDLC): Process of building software." },
            { question: "Which SDLC approach is used when requirements are clear and stable?", options: ["Adaptive Approach", "Incremental Approach", "Predictive Approach", "Agile Approach"], answer: "Predictive Approach", topic: "SDLC Approaches", explanation: "Predictive Approach: Used when requirements are clear and stable." },
            { question: "Which SDLC approach is used when requirements are uncertain and evolving?", options: ["Predictive Approach", "Waterfall Approach", "Adaptive Approach", "Static Approach"], answer: "Adaptive Approach", topic: "SDLC Approaches", explanation: "Adaptive Approach: Used when requirements are uncertain and evolving." },
            { question: "In the Predictive Phases, which phase involves identifying the problem and getting approval?", options: ["Analysis", "Project Initiation", "Implementation", "Deployment"], answer: "Project Initiation", topic: "SDLC Phases", explanation: "Project Initiation: Identify problem and approval." },
            { question: "Which phase is dedicated to organizing tasks and the schedule?", options: ["Project Initiation", "Project Planning", "Analysis", "Design"], answer: "Project Planning", topic: "SDLC Phases", explanation: "Project Planning: Organize tasks and schedule." },
            { question: "Which phase focuses on understanding system requirements?", options: ["Design", "Analysis", "Support", "Deployment"], answer: "Analysis", topic: "SDLC Phases", explanation: "Analysis: Understand system requirements." },
            { question: "Which phase involves structuring system components?", options: ["Analysis", "Implementation", "Design", "Deployment"], answer: "Design", topic: "SDLC Phases", explanation: "Design: Structure system components." },
            { question: "In which phase is the system developed and tested?", options: ["Analysis", "Design", "Implementation", "Support"], answer: "Implementation", topic: "SDLC Phases", explanation: "Implementation: Develop and test system." },
            { question: "Which phase involves installing and using the system?", options: ["Implementation", "Deployment", "Planning", "Analysis"], answer: "Deployment", topic: "SDLC Phases", explanation: "Deployment: Install and use system." },
            { question: "Which phase is focused on maintaining and improving the system?", options: ["Support", "Deployment", "Implementation", "Design"], answer: "Support", topic: "SDLC Phases", explanation: "Support: Maintain and improve system." },
            { question: "What is defined as the guidelines for SDLC processes?", options: ["Models", "Tools", "Techniques", "Methodology"], answer: "Methodology", topic: "Components", explanation: "Methodology: Guidelines for SDLC processes." },
            { question: "Use Case, Class Diagrams, and ERDs are examples of what methodology component?", options: ["Tools", "Techniques", "Models", "Frameworks"], answer: "Models", topic: "Components", explanation: "Models: Visual tools (Use Case, Class Diagram, ERD, Gantt Chart)." },
            { question: "What component refers to software like IDEs and modeling tools?", options: ["Techniques", "Models", "Tools", "Systems"], answer: "Tools", topic: "Components", explanation: "Tools: Software like IDEs and modeling tools." },
            { question: "What component refers to methods like interviews and testing?", options: ["Models", "Tools", "Techniques", "Logic"], answer: "Techniques", topic: "Components", explanation: "Techniques: Methods like interviews and testing." }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const topicTag = document.getElementById('topic-tag');
        const questionNumber = document.getElementById('question-number');
        const progressBar = document.getElementById('progress-bar');
        const optionsContainer = document.getElementById('options-container');
        const explanationContainer = document.getElementById('explanation-container');
        const explanationText = document.getElementById('explanation-text');
        const actionArea = document.getElementById('action-area');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            questions = shuffle([...rawQuestions]).map(q => {
                const shuffledOptions = shuffle([...q.options]);
                return { ...q, options: shuffledOptions };
            });
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            questionText.textContent = q.question;
            topicTag.textContent = q.topic;
            questionNumber.textContent = `Question ${currentQuestionIndex + 1}/${questions.length}`;
            progressBar.style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            actionArea.classList.add('hidden');
            explanationContainer.classList.add('hidden');

            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-4 rounded-xl border-2 border-slate-700 text-left font-medium transition-all hover:bg-slate-800 hover:border-indigo-500/50 group flex justify-between items-center bg-slate-800/40";
                btn.innerHTML = `<span>${opt}</span>`;
                btn.onclick = () => selectOption(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedText) {
            const q = questions[currentQuestionIndex];
            const buttons = optionsContainer.getElementsByTagName('button');
            
            for (let btn of buttons) {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                
                if (btnText === q.answer) {
                    btn.classList.add('correct');
                }
                if (btnText === selectedText && selectedText !== q.answer) {
                    btn.classList.add('wrong');
                }
            }

            if (selectedText === q.answer) {
                score++;
            }

            explanationText.textContent = q.explanation;
            explanationContainer.classList.remove('hidden');
            actionArea.classList.remove('hidden');
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('results-card').classList.remove('hidden');
            const finalScore = document.getElementById('final-score');
            const percentage = document.getElementById('percentage');
            
            finalScore.textContent = `${score} / ${questions.length}`;
            const perc = Math.round((score / questions.length) * 100);
            percentage.textContent = `${perc}% Mastery`;
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
